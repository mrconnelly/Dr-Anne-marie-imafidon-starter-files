<!DOCTYPE html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <title>Dr Anne Marie Imafidon</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="cream-bg">
      <div class="container">
        <img
          src="./img/1.jpg"
          class="profile-photo"
          alt="Dr Anne Marie Imafidon"
        />

        <p>Pioneer for women in STEM</p>
      </div>
      <div class="scroll-arrow">Scroll Down</div>
    </section>

     <section>
      <div class="container">
        <img
          src="./img/2.jpg"
          class="photo"
          alt="Dr Anne Marie Imafidon"
        />

        <p>At age 11 became the youngest person ever to receive A Level in computer science.
At age 20 she recived a masters degree from Oxford</p>
      </div>
    </section>

    <section class="bg-cream">
      <div class="container">
        <img
          src="./img/3.jpg"
          class="photo"
          alt="Dr Anne Marie Imafidon"
        />
        <h2>Stemettes</h2>
        <p>
Reaches 1000's of young women through workshops and mentoring

</p>
      </div>
    </section>


    
  </body>

<script>
 document.querySelector('.scroll-arrow').addEventListener('click', function() {
    window.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
});
</script>
